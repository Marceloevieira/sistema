<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	template="template/ui.xhtml">
	<ui:define name="body">
		<h:form>
		<p:growl id="mensagem" showDetail="true"  />
			<p:panel header="Cadastro de Cliente">
				<div align="center">
					<p:panelGrid columns="2" cellpadding="2"
						style="border: none !important;">

						<p:outputLabel for="nome" value="Cliente : " />
						<p:inputText id="nome" value="#{clienteBean.cliente.nome}" />

						<p:outputLabel for="telefone" value="Telefone Residencial : " />
						<p:inputMask id="telefone" mask="(99) 9999-9999"
							value="#{clienteBean.cliente.telefone}" />

						<p:outputLabel for="celular" value="Telefone Celular : " />
						<p:inputMask id="celular" mask="(99) 9999-9999"
							value="#{clienteBean.cliente.celular}" />

						<p:outputLabel for="ativo" value="Ativo : " />
						<p:selectBooleanButton id="ativo"
							value="#{clienteBean.cliente.ativo}"  onLabel="SIM" offLabel="NAO"
							onIcon="ui-icon-check" offIcon="ui-icon-close" />

						<p:outputLabel for="observacao" value="Observação : " />
						<p:inputTextarea id="observacao"
							value="#{clienteBean.cliente.observacao}" rows="5" cols="30"
							counter="display" maxlength="255"
							counterTemplate="{0} characters remaining." autoResize="false" />
						<p:column />
						<p:outputLabel id="display" />
					</p:panelGrid>
					<p:panelGrid columns="1" cellpadding="2"
						style="border: none !important;">
						<p:commandButton value="Cadastrar"
							actionListener="#{clienteBean.salvar()}" update="mensagem" />
					</p:panelGrid> 
				</div>

			</p:panel>

		</h:form>

	</ui:define>
</ui:composition>
