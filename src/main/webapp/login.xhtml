<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	template="template/ui.xhtml">
	<ui:define name="body">

		<h:form id="loginform">
			<div align="center">
				<p:growl id="mensagem" showDetail="true"  />

				<p:panel header="LOGIN" style="width:300px;">


					<p:inputText id="nome" value="#{login.usuario.nome}"
						required="true" />
					<p></p>
					<p:password id="senha" value="#{login.usuario.senha}"
						required="true" />
					<p></p>

					<p:commandButton value="Conectar" actionListener="#{login.logar}"
						update="mensagem">

					</p:commandButton>

				</p:panel>
			</div>
		</h:form>
	</ui:define>
</ui:composition>
